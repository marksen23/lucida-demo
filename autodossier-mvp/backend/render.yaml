services:
  - type: web
    name: autodossier-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: autodossier-mvp/backend
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ADAC_PDF_DIR
        value: /opt/render/project/src/adac_pdfs
    healthCheckPath: /health